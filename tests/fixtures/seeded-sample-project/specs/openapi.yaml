# Sample Project OpenAPI spec — seeded for the tc-knowledge fixture.
# Intentionally domain-neutral: a generic SaaS dashboard.

openapi: 3.0.3
info:
  title: Sample Project API
  version: 0.1.0
  description: Generic SaaS dashboard surface used by the seeded-sample-project fixture.

servers:
  - url: http://localhost:8000

paths:
  /sessions:
    post:
      summary: Create a session (sign in).
      operationId: sign_in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Invalid credentials.
  /sessions/{id}:
    delete:
      summary: Destroy a session (sign out).
      operationId: sign_out
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session destroyed.
  /accounts/{id}:
    get:
      summary: Read an account.
      operationId: get_account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
  /workspaces:
    # knowledge: unimplemented-endpoint
    # The spec declares GET /workspaces but src/ contains no handler for it.
    get:
      summary: List the workspaces the caller owns.
      operationId: list_workspaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of workspaces.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
  /workspaces/{id}/assets:
    post:
      summary: Upload an asset into a workspace.
      operationId: upload_file
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AssetUpload"
      # knowledge: unspecified-status
      # responses keys are intentionally absent here to seed the unspecified-status gap.
    get:
      summary: List assets in a workspace.
      operationId: list_assets
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A list of assets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

components:
  schemas:
    SignInRequest:
      type: object
      required: [account_id, code]
      properties:
        account_id:
          type: string
        code:
          type: string
    Session:
      type: object
      properties:
        id:
          type: string
        account_id:
          type: string
        expires_at:
          type: string
    Account:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
        role:
          type: string
    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner_account_id:
          type: string
    Asset:
      type: object
      properties:
        id:
          type: string
        workspace_id:
          type: string
        name:
          type: string
        size_bytes:
          type: integer
        content_type:
          type: string
    AssetUpload:
      # knowledge: schema-without-type
      # type and $ref are intentionally absent to seed the schema-without-type gap.
      properties:
        file:
          type: string
        name:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
